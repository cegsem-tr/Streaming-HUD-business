services:
  - type: web
    name: mon-business-automatique
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SEARCH_ENGINE_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
